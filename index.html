function addPoly(f){let poly=L.polygon(POLYS[f],{color:colorFor(f),weight:2,fillColor:colorFor(f),fillOpacity:.28}).addTo(map); layers[f]=poly; poly.bindTooltip(f,{permanent:true,direction:'center',className:'label'}); poly.on('click',()=>{selectField(f); openLaunch();}); poly.bindPopup(`<b>Talhão ${f}</b><br>Área: ${AREAS[f]||'-'} ha<br><button onclick="selectField('${f}');openLaunch()">Lançar chuva</button>`);}
function fitAll(){let group=L.featureGroup(Object.values(layers)); map.fitBounds(group.getBounds().pad(.12)); selectField('Todos')}
function selectField(f){selected=f; fieldFilter.value=f; if(f!=='Todos') field.value=f; for(const [name,layer] of Object.entries(layers)){const active=f==='Todos'||f===name; layer.setStyle({fillOpacity:active?.35:.08,weight:f===name?5:2}); if(active&&!map.hasLayer(layer)) layer.addTo(map); } if(f!=='Todos') map.fitBounds(layers[f].getBounds().pad(.35)); refresh();}
function openLaunch(){document.getElementById('mm').focus();}
function saveRain(){const f=field.value, val=parseFloat(mm.value); if(!f||isNaN(val)||val<0){alert('Coloque o talhão e os milímetros.');return} rains.push({id:Date.now(),field:f,date:date.value||today(),mm:val,resp:resp.value,obs:obs.value.trim()}); localStorage.setItem(key,JSON.stringify(rains)); mm.value=''; obs.value=''; refresh();}
function filtered(){return selected==='Todos'?rains:rains.filter(r=>r.field===selected)} function sum(arr){return arr.reduce((a,b)=>a+Number(b.mm||0),0)}
function refresh(){const t=today(); const month=t.slice(0,7); let rows=''; for(const f of FIELD_ORDER){const a=rains.filter(r=>r.field===f); const hoje=sum(a.filter(r=>r.date===t)); const mes=sum(a.filter(r=>r.date&&r.date.slice(0,7)===month)); const safra=sum(a); const last=a.sort((x,y)=>y.date.localeCompare(x.date))[0]?.date||''; const cls=hoje>0?'pill':(last?'pill dry':'pill zero'); rows+=`<tr onclick="selectField('${f}')"><td><b>${f}</b><br><small>${AREAS[f]} ha</small></td><td><span class="${cls}">${hoje.toFixed(1)}</span></td><td>${mes.toFixed(1)}</td><td>${safra.toFixed(1)}</td><td>${br(last)}</td></tr>`; } summaryRows.innerHTML=rows; const h=filtered().slice().sort((a,b)=>b.id-a.id).slice(0,25); history.innerHTML=h.length?h.map(r=>`<div class="item"><div><b>${r.field}</b> • ${r.mm} mm<br><small>${br(r.date)} • ${r.resp} ${r.obs?'• '+r.obs:''}</small></div><button class="btn secondary" onclick="del(${r.id})">Apagar</button></div>`).join(''):'<small style="color:var(--muted)">Sem lançamentos ainda.</small>';}
function del(id){if(confirm('Apagar lançamento?')){rains=rains.filter(r=>r.id!==id);localStorage.setItem(key,JSON.stringify(rains));refresh();}}
function exportCSV(){let csv='data,talhao,mm,responsavel,observacao
'+rains.map(r=>[r.date,r.field,r.mm,r.resp,(r.obs||'').replaceAll(',', ' ')].join(',')).join('
'); let a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download='chuvas_gmv_matao.csv'; a.click();}
function backup(){let a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify(rains,null,2)],{type:'application/json'})); a.download='backup_chuvas_gmv.json'; a.click();}
window.addEventListener('load',init);
</script></body></html>
