const ORDER=['Sede','1A','1B','1C','2A','2B','3A','3B','4A','4B','4C'];
const COLORS=['#2dd4bf','#22c55e','#84cc16','#eab308','#f97316','#ef4444','#a855f7','#3b82f6','#14b8a6','#facc15','#38bdf8'];
let map, layerGroup, labels=[], selected=ORDER[0], chart;
const $=id=>document.getElementById(id);
function today(){return new Date().toISOString().slice(0,10)}
function key(){return 'gmv_chuvas_v12'}
function load(){try{return JSON.parse(localStorage.getItem(key())||'[]')}catch(e){return []}}
function store(arr){localStorage.setItem(key(),JSON.stringify(arr))}
function norm(v){return String(v||'').replace(',','.').trim()}
function fmt(n){return (Math.round((Number(n)||0)*10)/10).toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1})}
function monthOf(d){return (d||'').slice(0,7)}
function currentMonth(){return today().slice(0,7)}
function areaByName(n){const f=TALHOES_GEOJSON.features.find(x=>x.properties.name===n); return f?f.properties.area:0}
function init(){
 $('dataInput').value=today();
 fillSelects();
 initMap();
 renderAll();
 document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>showScreen(b.dataset.screen));
 $('busca').addEventListener('input',()=>{const q=$('busca').value.toLowerCase(); const found=ORDER.find(n=>n.toLowerCase().includes(q)); if(found) selectTalhao(found,true);});
}
function fillSelects(){['talhaoFiltro','talhaoInput'].forEach(id=>{const s=$(id);s.innerHTML='';ORDER.forEach(n=>{const o=document.createElement('option');o.value=n;o.textContent=n;s.appendChild(o);});});$('talhaoFiltro').value=selected;$('talhaoInput').value=selected;$('talhaoInput').onchange=e=>selectTalhao(e.target.value,true);$('talhaoFiltro').onchange=e=>selectTalhao(e.target.value,true)}
function initMap(){
 map=L.map('map',{zoomControl:true,preferCanvas:true}).setView([-10.72,-52.74],13);
 const esri=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19,attribution:'Tiles © Esri'}).addTo(map);
 const osm=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'});
 L.control.layers({'Satélite':esri,'Mapa':osm},{}).addTo(map);
 layerGroup=L.geoJSON(TALHOES_GEOJSON,{style:f=>styleFor(f.properties.name),onEachFeature:(f,l)=>{const n=f.properties.name;l.on('click',()=>selectTalhao(n,true));l.bindPopup(()=>`<b>${n}</b><br>Área: ${fmt(f.properties.area)} ha<br><button class="popBtn" onclick="selectTalhao('${n}',true);document.getElementById('mmInput').focus()">Lançar chuva</button>`);}}).addTo(map);
 layerGroup.eachLayer(l=>{const c=l.getBounds().getCenter(); const n=l.feature.properties.name; labels.push(L.marker(c,{icon:L.divIcon({className:'labelTalhao',html:`${n}<br><small>${fmt(l.feature.properties.area)} ha</small>`,iconSize:null})}).addTo(map));});
 fitAll();
}
function styleFor(n){const i=ORDER.indexOf(n);return {color:selected===n?'#ffffff':'#e6fff6',weight:selected===n?4:2,fillColor:COLORS[i%COLORS.length],fillOpacity:selected===n?.55:.32}}
function refreshStyles(){layerGroup.eachLayer(l=>l.setStyle(styleFor(l.feature.properties.name)))}
function fitAll(){if(layerGroup) map.fitBounds(layerGroup.getBounds(),{padding:[30,30]})}
function selectFromFiltro(){selectTalhao($('talhaoFiltro').value,true)}
function selectTalhao(n,zoom){selected=n;$('talhaoFiltro').value=n;$('talhaoInput').value=n;refreshStyles();if(zoom){layerGroup.eachLayer(l=>{if(l.feature.properties.name===n){map.fitBounds(l.getBounds(),{padding:[60,60]});l.openPopup();}})}renderAll();}
function saveRain(){
 const t=$('talhaoInput').value; const d=$('dataInput').value || today(); const mm=Number(norm($('mmInput').value));
 if(!t){alert('Escolha o talhão.');return} if(!d){alert('Escolha a data.');return} if(!mm || mm<=0){alert('Informe a chuva em mm.');return}
 const arr=load(); arr.push({id:Date.now(),talhao:t,data:d,mm:mm,resp:$('respInput').value,obs:$('obsInput').value||''}); store(arr); selected=t; $('mmInput').value=''; $('obsInput').value=''; $('status').textContent='✅ Salvo: '+t+' • '+fmt(mm)+' mm'; setTimeout(()=>$('status').textContent='',3500); renderAll();
}
function statsFor(t){const arr=load().filter(x=>x.talhao===t); const hoje=arr.filter(x=>x.data===today()).reduce((s,x)=>s+x.mm,0); const mes=arr.filter(x=>monthOf(x.data)===currentMonth()).reduce((s,x)=>s+x.mm,0); const safra=arr.reduce((s,x)=>s+x.mm,0); const last=arr.sort((a,b)=>b.data.localeCompare(a.data)||b.id-a.id)[0]; return {hoje,mes,safra,last:last?last.data:'--'} }
function renderSummary(){let html='<thead><tr><th>Talhão</th><th>Hoje</th><th>Mês</th><th>Safra</th><th>Última</th></tr></thead><tbody>'; ORDER.forEach(t=>{const s=statsFor(t); html+=`<tr onclick="selectTalhao('${t}',true)" style="cursor:pointer"><td><span class="badge">${t}</span></td><td>${fmt(s.hoje)}</td><td>${fmt(s.mes)}</td><td>${fmt(s.safra)}</td><td>${s.last}</td></tr>`}); html+='</tbody>';$('summaryTable').innerHTML=html;}
function renderLast(){const arr=load().slice().sort((a,b)=>b.id-a.id).slice(0,20); $('lastList').innerHTML=arr.length?arr.map(x=>`<div class="histItem"><span class="badge">${x.talhao}</span><div><b>${fmt(x.mm)} mm</b><div class="small">${x.data} • ${x.resp||''}${x.obs?' • '+x.obs:''}</div></div><button class="secondary danger" onclick="del(${x.id})">Excluir</button></div>`).join(''):'<div class="small">Nenhum lançamento ainda.</div>';}
function del(id){if(confirm('Excluir este lançamento?')){store(load().filter(x=>x.id!==id));renderAll();}}
function renderAll(){renderSummary();renderLast();renderChart();refreshStyles();}
function showScreen(s){document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.screen===s)); const titles={dashboard:'Controle de Chuvas por Talhão',lancar:'Lançar Chuva',talhoes:'Talhões da Fazenda',historico:'Histórico de Lançamentos',graficos:'Gráficos de Chuva',config:'Configurações e Backup'}; $('pageTitle').textContent=titles[s]||'GMV Chuvas'; if(s==='graficos') setTimeout(renderChart,200); if(s==='historico') renderLast();}
function renderChart(){let cvs=$('chartCanvas'); if(!cvs){const c=document.createElement('div');c.className='card';c.innerHTML='<h3>📈 Gráfico do mês</h3><div class="graphWrap"><canvas id="chartCanvas"></canvas></div>';document.querySelector('.right').appendChild(c);cvs=$('chartCanvas')} const data=ORDER.map(t=>({t,mm:statsFor(t).mes})); if(chart) chart.destroy(); chart=new Chart(cvs,{type:'bar',data:{labels:data.map(x=>x.t),datasets:[{label:'Chuva no mês (mm)',data:data.map(x=>x.mm)}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#eafff8'}}},scales:{x:{ticks:{color:'#c9fff2'},grid:{color:'#1d665855'}},y:{ticks:{color:'#c9fff2'},grid:{color:'#1d665855'}}}}});}
function exportCSV(){const rows=[['data','talhao','mm','responsavel','observacao'],...load().map(x=>[x.data,x.talhao,String(x.mm).replace('.',','),x.resp,x.obs])]; const csv=rows.map(r=>r.map(v=>'"'+String(v||'').replaceAll('"','""')+'"').join(';')).join('\n'); download('gmv_chuvas.csv',csv,'text/csv;charset=utf-8')}
function downloadBackup(){download('backup_gmv_chuvas.json',JSON.stringify(load(),null,2),'application/json')}
function download(name,content,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
window.addEventListener('load',init);
</script>
